name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/upload-artifact@v4

      - name: Unzip project
        run: unzip MaskRunnerFinal.zip -d project

      - name: Set up JDK
        uses: actions/upload-artifact@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build APK
        run: |
          cd project
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: project/app/build/outputs/apk/debug/app-debug.apk
